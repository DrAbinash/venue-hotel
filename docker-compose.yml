services:
  venue-hotel:
    build: .
    image: venue-hotel:latest
    container_name: venue-hotel
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/hotel.db
    volumes:
      - venue-hotel-data:/app/data
      - venue-hotel-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"try { require('http').get('http://localhost:3000/', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 5000); } catch(e) { process.exit(1); }\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  venue-hotel-data:
    name: venue-hotel-data
  venue-hotel-uploads:
    name: venue-hotel-uploads
